<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voyage — You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #223843;
      --secondary: #d77a61;
      --bg: #eff1f3;
      --surface: #ffffff;
      --text: #223843;
      --text-muted: #4a5d67;
      --radius: 18px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --primary: #e8edf0;
        --secondary: #d77a61;
        --bg: #101820;
        --surface: #1a2530;
        --text: #e8edf0;
        --text-muted: #7d8c94;
      }
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-wrap img {
      width: 40px;
      height: 40px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .status {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d77a61;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <img src="/icon.svg" alt="Voyage" />
    </div>
    <h1>You're offline</h1>
    <p>
      Check your internet connection and try again.<br />
      Your trip plans are safe and will sync when you're back online.
    </p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
    <div class="status">
      <span class="dot"></span>Waiting for connection…
    </div>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
